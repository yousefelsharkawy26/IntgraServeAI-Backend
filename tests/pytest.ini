[pytest]
filterwarnings =
    ignore::DeprecationWarning:pytest_freezegun.*
asyncio_mode = auto
testpaths = tests
pythonpath = .
addopts = -v --strict-markers --tb=short
markers =
    unit: Unit tests with no external dependencies
    integration: Integration tests requiring external services
    slow: Tests that take longer than 1 second
    security: Penetration and security tests
    requires_ollama: Requires local Ollama instance
    requires_openai_key: Requires OpenAI API key
    requires_groq_key: Requires Groq API key
